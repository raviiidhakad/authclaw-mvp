name: CI Quality

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install ruff
      - name: Compile backend modules
        run: |
          cd apps/api
          python -m compileall -q app
      - name: Ruff correctness checks
        run: |
          cd apps/api
          ruff check app --select E9,F821,F822,F823
