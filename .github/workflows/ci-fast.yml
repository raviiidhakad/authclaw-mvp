name: CI Fast

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
      - name: Start backend test services
        run: |
          docker compose config --quiet
          docker compose up -d --wait db redis redpanda vault clickhouse
      - name: Run Alembic migrations
        env:
          ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5434/authclaw
          DATABASE_URL: postgresql+asyncpg://authclaw_app:authclaw_app_password@localhost:5434/authclaw
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-jwt-secret-at-least-32-bytes-long
          ENCRYPTION_KEY: 0Us8ttRG0f5n1JuxMd-cp92xZcd9xxztZxQaNnhli50=
          ENCRYPTION_PROVIDER: local
          KAFKA_BROKERS: localhost:19092
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: local-vault-root-token
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: authclaw
          CLICKHOUSE_PASSWORD: authclaw_clickhouse_local_password
          CLICKHOUSE_DB: authclaw
        run: |
          cd apps/api
          alembic upgrade head
      - name: Run backend smoke tests
        env:
          PYTHONPATH: .
          APP_DEBUG: "false"
          ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5434/authclaw
          DATABASE_URL: postgresql+asyncpg://authclaw_app:authclaw_app_password@localhost:5434/authclaw
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-jwt-secret-at-least-32-bytes-long
          ENCRYPTION_KEY: 0Us8ttRG0f5n1JuxMd-cp92xZcd9xxztZxQaNnhli50=
          ENCRYPTION_PROVIDER: local
          KAFKA_BROKERS: localhost:19092
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: local-vault-root-token
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: authclaw
          CLICKHOUSE_PASSWORD: authclaw_clickhouse_local_password
          CLICKHOUSE_DB: authclaw
        run: |
          cd apps/api
          pytest \
            tests/test_api.py \
            tests/test_gateway_api_contract.py \
            tests/test_rls_isolation.py \
            -x -q --tb=short --disable-warnings
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color db redis redpanda vault clickhouse
      - name: Stop services
        if: always()
        run: docker compose down --volumes
