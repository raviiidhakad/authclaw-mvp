name: CI Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
          
      - name: Start services (Docker Compose)
        run: |
          docker compose config --quiet
          docker compose up -d --wait db redis redpanda vault clickhouse
          
      - name: Run Alembic migrations
        run: |
          docker compose run --rm -T \
            -e PYTHONPATH=. \
            -e APP_DEBUG=false \
            -e DB_HOST=db \
            -e DB_PORT=5432 \
            -e DB_NAME=authclaw \
            -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY || 'test-jwt-secret-at-least-32-bytes-long' }}" \
            -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY || '0Us8ttRG0f5n1JuxMd-cp92xZcd9xxztZxQaNnhli50=' }}" \
            api alembic upgrade head
          
      - name: Run integration tests
        run: |
          docker compose run --rm -T \
            -e PYTHONPATH=. \
            -e APP_DEBUG=false \
            -e DB_HOST=db \
            -e DB_PORT=5432 \
            -e DB_NAME=authclaw \
            -e PYTHONUNBUFFERED=1 \
            -e STRESS_BATCH_SIZE=10 \
            -e STRESS_TIMEOUT_SECONDS=10 \
            -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY || 'test-jwt-secret-at-least-32-bytes-long' }}" \
            -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY || '0Us8ttRG0f5n1JuxMd-cp92xZcd9xxztZxQaNnhli50=' }}" \
            api sh -c "timeout 10m pytest tests/test_rls_isolation.py \
            tests/test_engine.py \
            tests/test_limiter.py \
            tests/test_streaming.py \
            tests/test_azure_auth.py \
            tests/integration/test_event_backbone.py \
            tests/performance/test_backbone_stress.py \
            -vv -s --tb=short --durations=20"
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color db redis redpanda vault clickhouse
            
      - name: Stop services
        if: always()
        run: docker compose down --volumes
