name: CI Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine image tag
        id: image
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/authclaw-api:${{ steps.image.outputs.tag }}
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/authclaw-api:${{ steps.image.outputs.tag }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
          
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/authclaw-api:${{ steps.image.outputs.tag }}
          artifact-name: sbom.spdx.json
          
      # Note: SBOM attestation is informational, not a blocker.
