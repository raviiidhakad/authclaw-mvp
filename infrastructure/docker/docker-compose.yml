version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: authclaw-db
    restart: always
    environment:
      POSTGRES_USER: authclaw
      POSTGRES_PASSWORD: authclaw_secret
      POSTGRES_DB: authclaw
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: authclaw-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: authclaw-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://authclaw:authclaw_secret@db:5432/authclaw
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
    ports:
      - "8001:8000"
    volumes:
      - ../../apps/api:/app
    # Run uvicorn with reload for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: authclaw-web
    restart: always
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1

volumes:
  pgdata:
  redisdata:
