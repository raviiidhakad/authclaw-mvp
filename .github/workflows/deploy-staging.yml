name: Deploy - Staging

on:
  workflow_run:
    workflows: ["CI Container"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Specific image tag to deploy. Defaults to sha-<commit>."
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/authclaw-api
  ECS_CLUSTER: authclaw-cluster-staging
  ECS_SERVICE_API: authclaw-api-service
  TASK_FAMILY_API: authclaw-staging-api
  CONTAINER_API: authclaw-api

jobs:
  check-gate:
    runs-on: ubuntu-latest
    if: >
      vars.ENABLE_STAGING_DEPLOY == 'true' && (
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      )
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
    steps:
      - name: Evaluate deployment gate
        id: gate
        run: |
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Staging deployment gate passed."

  run-migrations:
    needs: check-gate
    if: needs.check-gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Alembic migrations via ECS Task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY_API }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.STAGING_PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.STAGING_MIGRATION_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"${{ env.CONTAINER_API }}","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "::notice::Migrations completed successfully."

  deploy-api:
    needs: run-migrations
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "tag=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY_API }} \
            --query taskDefinition > api-task-definition.json

      - name: Render API task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-definition.json
          container-name: ${{ env.CONTAINER_API }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  deploy-workers:
    needs: run-migrations
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        worker:
          - service: authclaw-audit-worker
            family: authclaw-staging-audit-worker
            container: authclaw-audit-worker
          - service: authclaw-security-worker
            family: authclaw-staging-security-worker
            container: authclaw-security-worker
          - service: authclaw-reconciler-worker
            family: authclaw-staging-reconciler-worker
            container: authclaw-reconciler-worker
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "tag=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch current worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ matrix.worker.family }} \
            --query taskDefinition > worker-task-definition.json

      - name: Render worker task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-definition.json
          container-name: ${{ matrix.worker.container }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}

      - name: Deploy worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.worker.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  smoke-test:
    needs: [deploy-api, deploy-workers]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_API_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "::notice::Staging health check passed (HTTP $STATUS)."

      - name: Post deployment summary
        run: |
          echo "## Staging Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Migrations | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Audit Worker | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Worker | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reconciler Worker | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke Test | passed |" >> "$GITHUB_STEP_SUMMARY"
