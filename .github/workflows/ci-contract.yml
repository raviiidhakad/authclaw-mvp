name: CI Contract

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
      - name: Run contract tests
        env:
          PYTHONPATH: .
          APP_DEBUG: "false"
          DATABASE_URL: postgresql+asyncpg://authclaw_app:authclaw_app_password@localhost:5434/authclaw
          ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5434/authclaw
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-jwt-secret-at-least-32-bytes-long
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || '0Us8ttRG0f5n1JuxMd-cp92xZcd9xxztZxQaNnhli50=' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          cd apps/api
          pytest tests/test_adapters_contract.py \
            tests/integration/providers/test_contracts.py \
            -v --tb=short -s
